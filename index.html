<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yelim Hong — Software Engineer</title>
<link rel="icon" type="image/png" href="favicon.png?v=6">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<!-- hide loader text until web fonts are ready, so the pixel title doesn't visibly swap from a fallback font -->
<style>
  .fonts-loading .loader-name,.fonts-loading .loader-role,.fonts-loading .loader-row{opacity:0;}
  .loader-name,.loader-role,.loader-row{transition:opacity .35s ease;}
</style>
<script>
  (function () {
    var d = document.documentElement;
    d.classList.add("fonts-loading");
    function reveal() { d.classList.remove("fonts-loading"); }
    if (document.fonts && document.fonts.ready) {
      try { document.fonts.load('700 62px "Silkscreen"'); document.fonts.load('400 13px "Space Mono"'); } catch (e) {}
      document.fonts.ready.then(reveal);
      setTimeout(reveal, 2500); // fail-safe: never keep text hidden if a font never loads
    } else {
      reveal();
    }
  })();
</script>
<link rel="stylesheet" href="css/room.css">
<link rel="stylesheet" href="css/desktop.css">
</head>
<body>
  <!-- 3D stage -->
  <div id="stage"></div>

  <!-- CRT OS overlay (shown when zoomed into the monitor) -->
  <div id="crt" aria-hidden="true">
    <div id="crt-frame">
      <div id="crt-screen"></div>
      <div class="crt-scanlines"></div>
      <div class="crt-vignette"></div>
      <div class="crt-flicker"></div>
    </div>
  </div>

  <!-- on-screen chrome -->
  <div id="chrome">
    <button id="backBtn" class="chrome-btn" hidden>&larr; STEP BACK</button>
    <button id="soundBtn" class="chrome-btn" title="ambience">♪ <span>OFF</span></button>
  </div>

  <!-- hint removed per request; the idle screen shows the 'click to enter' cue -->

  <!-- loader -->
  <div id="loader">
    <div class="loader-inner">
      <div class="loader-name">YELIM&nbsp;HONG</div>
      <div class="loader-role">SOFTWARE&nbsp;ENGINEER · BACKEND&nbsp;·&nbsp;INFRA</div>
      <div class="loader-bar"><div class="loader-bar-fill" id="barFill"></div></div>
      <div class="loader-row">
        <span class="loader-pct" id="pct">0%</span>
        <span class="loader-status" id="status">BOOTING…</span>
      </div>
      <button id="enterBtn" class="enter-btn" disabled>ENTER</button>
    </div>
    <div class="loader-foot">Seoul, Korea · 2026</div>
  </div>

  <noscript><div style="position:fixed;inset:0;display:grid;place-items:center;font-family:monospace;background:#1a1410;color:#e9c89a">JavaScript required.</div></noscript>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/scene.js"></script>
</body>
</html>
